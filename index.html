  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"]
          },
          colors: {
            "primary": "#00d4ff",
                        "background-dark": "#0a0c10",
                        "neon-purple": "#bc00ff",
                        "neon-cyan": "#00d4ff",
                        "card-bg": "rgba(255, 255, 255, 0.03)",
            zenergy: {
              background: '#0a0c12',
              card: 'rgba(255, 255, 255, 0.03)',
              accent: '#00d4ff',
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
            'neon-glow': 'neon-pulse 2s ease-in-out infinite alternate',
          },
          keyframes: { 
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            'neon-pulse': {
              'from': { 'box-shadow': '0 0 5px #00d4ff, 0 0 10px #00d4ff' },

  <style type="text/tailwindcss">
    body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #060608;
            overflow: hidden;
        }
        /* Remove browser default focus highlights */
        input:focus, button:focus {
            outline: none !important;
            box-shadow: none !important;
        }
        /* Refined Mesh Gradient - more circular/organic */
        .mesh-gradient {
            background: radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.12) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 203, 0.12) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(0, 204, 102, 0.08) 0%, transparent 50%);
        }
        .neon-blob {
            filter: blur(100px);
            opacity: 0.3;
            pointer-events: none;
            border-radius: 50%;
        }
        
        /* Lateral Cover Transition - Spring Feel */
        .lateral-spring {
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Floating effect for the cards */
        @keyframes float {
            0% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-12px) rotateX(0.5deg); }
            100% { transform: translateY(0px) rotateX(0deg); }
        }
        .card-floating {
            animation: float 8s ease-in-out infinite;
        }

        /* Moving ambient light effect */
        @keyframes ambientMove {
            0% { transform: translate(-5%, -5%) scale(1); }
            50% { transform: translate(5%, 5%) scale(1.05); }
            100% { transform: translate(-5%, -5%) scale(1); }
        }
        .ambient-layer {
            animation: ambientMove 25s ease-in-out infinite alternate;
        }
    @layer base {
      body {
        @apply bg-[#0a0c10] text-white antialiased overflow-x-hidden;
      }
      .glass-morphism {
        @apply bg-white/[0.03] backdrop-blur-2xl border border-white/[0.08];
      }
      .vibe-gradient-study { background: radial-gradient(circle at top right, rgba(168, 85, 247, 0.12), transparent 60%), radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.08), transparent 60%); }
      .vibe-gradient-gym { background: radial-gradient(circle at top right, rgba(239, 68, 68, 0.12), transparent 60%), radial-gradient(circle at bottom left, rgba(249, 115, 22, 0.08), transparent 60%); }
      .vibe-gradient-chill { background: radial-gradient(circle at top right, rgba(20, 184, 166, 0.12), transparent 60%), radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.08), transparent 60%); }
      .vibe-gradient-creative { background: radial-gradient(circle at top right, rgba(236, 72, 153, 0.12), transparent 60%), radial-gradient(circle at bottom left, rgba(245, 158, 11, 0.08), transparent 60%); }
      .vibe-gradient-bored { background: radial-gradient(circle at top right, rgba(34, 197, 94, 0.12), transparent 60%), radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.08), transparent 60%); }
      .vibe-gradient-funny { background: radial-gradient(circle at top right, rgba(253, 224, 71, 0.08), transparent 60%), radial-gradient(circle at bottom left, rgba(249, 115, 22, 0.08), transparent 60%); }
      
      /* Scrollbar hiding */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    }
